<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Netflix 台灣觀影週報</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --white: #ffffff;
  --bg: #f5f5f7;
  --bg2: #ffffff;
  --bg3: #fafafa;
  --text: #1d1d1f;
  --text2: #6e6e73;
  --text3: #aeaeb2;
  --red: #ff3b30;
  --red-light: rgba(255,59,48,0.08);
  --green: #34c759;
  --green-light: rgba(52,199,89,0.10);
  --blue: #0071e3;
  --blue-light: rgba(0,113,227,0.08);
  --amber: #ff9f0a;
  --amber-light: rgba(255,159,10,0.10);
  --border: rgba(0,0,0,0.06);
  --border2: rgba(0,0,0,0.10);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.05);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 6px;
  --font: -apple-system, 'SF Pro Display', 'Noto Sans TC', sans-serif;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── NAV ─────────────────────────────────────────────── */
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(245,245,247,0.82);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid var(--border2);
  padding: 0 24px;
}
.nav-inner {
  max-width: 980px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  height: 52px;
}
.nav-brand {
  display: flex; align-items: center; gap: 10px;
}
.nav-icon {
  width: 26px; height: 26px; border-radius: 6px;
  background: var(--red);
  display: flex; align-items: center; justify-content: center;
}
.nav-icon svg { width: 14px; height: 14px; fill: white; }
.nav-title { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; color: var(--text); }
.nav-week { font-size: 12px; color: var(--text2); }
.nav-tabs { display: flex; gap: 4px; }
.nav-tab {
  font-size: 13px; font-weight: 500; padding: 6px 14px;
  border-radius: 20px; border: none; background: transparent;
  color: var(--text2); cursor: pointer; transition: all 0.2s;
}
.nav-tab:hover { color: var(--text); background: rgba(0,0,0,0.05); }
.nav-tab.active { color: var(--white); background: var(--text); }

/* ── HERO ─────────────────────────────────────────────── */
.hero {
  max-width: 980px; margin: 0 auto;
  padding: 52px 24px 36px;
  animation: fadeUp 0.6s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
.hero-eyebrow {
  font-size: 12px; font-weight: 500; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--red);
  margin-bottom: 8px;
}
.hero-title {
  font-size: 48px; font-weight: 600; letter-spacing: -0.03em;
  line-height: 1.08; color: var(--text); margin-bottom: 10px;
}
.hero-sub {
  font-size: 19px; font-weight: 300; color: var(--text2);
  letter-spacing: -0.01em;
}

/* ── SHELL ─────────────────────────────────────────────── */
.shell { max-width: 980px; margin: 0 auto; padding: 0 24px 80px; }

.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeUp 0.4s ease both; }

/* ── SECTION LABEL ─────────────────────────────────────── */
.sec-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.07em;
  text-transform: uppercase; color: var(--text3);
  margin-bottom: 12px; padding-left: 2px;
}

/* ── METRIC CARDS ──────────────────────────────────────── */
.metrics {
  display: grid; grid-template-columns: repeat(3, minmax(0,1fr));
  gap: 12px; margin-bottom: 28px;
}
.metric {
  background: var(--bg2); border-radius: var(--radius);
  padding: 22px 24px; box-shadow: var(--shadow-sm);
  border: 0.5px solid var(--border);
  position: relative; overflow: hidden;
  transition: transform 0.2s, box-shadow 0.2s;
}
.metric:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.metric-accent {
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  border-radius: var(--radius) var(--radius) 0 0;
}
.metric.red .metric-accent { background: var(--red); }
.metric.green .metric-accent { background: var(--green); }
.metric.amber .metric-accent { background: var(--amber); }
.m-label { font-size: 12px; color: var(--text2); margin-bottom: 10px; font-weight: 400; }
.m-val {
  font-size: 38px; font-weight: 600; letter-spacing: -0.03em;
  color: var(--text); line-height: 1; margin-bottom: 6px;
}
.m-val span { font-size: 16px; font-weight: 400; color: var(--text2); margin-left: 2px; }
.m-sub { font-size: 12px; color: var(--text3); }
.m-diff {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 500; margin-top: 8px;
  padding: 3px 8px; border-radius: 20px;
}
.m-diff.up { background: var(--green-light); color: #1a7f37; }
.m-diff.dn { background: var(--red-light); color: #c0392b; }
.m-diff.flat { color: var(--text3); }

/* ── CARD ──────────────────────────────────────────────── */
.card {
  background: var(--bg2); border-radius: var(--radius);
  box-shadow: var(--shadow-sm); border: 0.5px solid var(--border);
  overflow: hidden; margin-bottom: 16px;
}
.card-header {
  padding: 18px 22px 14px;
  border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
.card-body { padding: 0; }

/* ── SUBTABS ───────────────────────────────────────────── */
.subtabs {
  display: flex; gap: 6px; padding: 16px 22px 0;
}
.stab {
  font-size: 13px; font-weight: 500; padding: 6px 16px;
  border-radius: 20px; border: 1px solid var(--border2);
  background: transparent; color: var(--text2); cursor: pointer; transition: all 0.15s;
}
.stab.active { background: var(--text); color: var(--white); border-color: transparent; }
.stab:hover:not(.active) { background: var(--bg3); color: var(--text); }

/* ── TABLE ─────────────────────────────────────────────── */
.rtable { width: 100%; border-collapse: collapse; }
.rtable th {
  font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
  text-transform: uppercase; color: var(--text3);
  padding: 10px 22px; text-align: left;
  border-bottom: 0.5px solid var(--border);
  background: var(--bg3);
}
.rtable th.r { text-align: right; }
.rtable td { padding: 13px 22px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
.rtable tr:last-child td { border-bottom: none; }
.rtable tbody tr { transition: background 0.15s; }
.rtable tbody tr:hover { background: var(--bg3); }

.rnum {
  font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
  color: var(--text3); display: inline-block; min-width: 28px;
}
.rnum.gold { color: var(--amber); }

.rtitle { font-size: 14px; font-weight: 500; color: var(--text); }
.rsub { font-size: 12px; color: var(--text2); margin-top: 2px; }
.streak {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 10px; font-weight: 600; padding: 2px 7px;
  border-radius: 20px; background: var(--amber-light);
  color: #b35900; margin-left: 7px; vertical-align: middle;
}
.country-flag { font-size: 16px; }
.country-name { font-size: 12px; color: var(--text2); display: block; margin-top: 1px; }
.hrs { font-size: 13px; font-weight: 500; color: var(--text); text-align: right; }
.chg { font-size: 11px; font-weight: 600; text-align: right; }
.chg.up { color: var(--green); }
.chg.dn { color: var(--red); }
.chg.new {
  background: var(--blue-light); color: var(--blue);
  padding: 2px 7px; border-radius: 20px; font-size: 10px;
}
.chg.flat { color: var(--text3); }
.imdb-score {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 500;
  background: var(--amber-light); color: #b35900;
  padding: 3px 8px; border-radius: var(--radius-xs);
}
.imdb-na { font-size: 12px; color: var(--text3); }
.airdate { font-size: 12px; color: var(--text2); text-align: right; }

/* ── BARS ──────────────────────────────────────────────── */
.bar-list { display: flex; flex-direction: column; gap: 14px; padding: 20px 22px; }
.bar-row { display: grid; grid-template-columns: 100px 1fr 46px; align-items: center; gap: 14px; }
.bar-name { font-size: 13px; color: var(--text2); text-align: right; }
.bar-track {
  height: 6px; background: rgba(0,0,0,0.06);
  border-radius: 3px; overflow: hidden;
}
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(.25,.46,.45,.94); }
.bar-pct { font-size: 13px; font-weight: 500; color: var(--text); }

/* ── CHART ─────────────────────────────────────────────── */
.chart-wrap { position: relative; width: 100%; }
.chart-pad { padding: 20px 22px 22px; }
.legend {
  display: flex; gap: 18px; margin-bottom: 14px;
  font-size: 12px; color: var(--text2);
}
.legend span { display: flex; align-items: center; gap: 6px; }
.ldot { width: 10px; height: 3px; border-radius: 2px; display: inline-block; }

/* ── GRID ──────────────────────────────────────────────── */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 28px; }

/* ── FOOTER ─────────────────────────────────────────────── */
footer {
  text-align: center; padding: 32px 24px;
  font-size: 12px; color: var(--text3);
  border-top: 0.5px solid var(--border2);
  margin-top: 20px;
}

/* ── ERROR ─────────────────────────────────────────────── */
.error-box {
  background: var(--red-light); border: 1px solid rgba(255,59,48,0.2);
  border-radius: var(--radius-sm); padding: 16px 20px;
  font-size: 13px; color: var(--red); margin-bottom: 20px;
}

@media (max-width: 680px) {
  .metrics { grid-template-columns: 1fr; }
  .grid2 { grid-template-columns: 1fr; }
  .hero-title { font-size: 32px; }
  .nav-tabs { display: none; }
  .rtable th:nth-child(4), .rtable td:nth-child(4),
  .rtable th:nth-child(5), .rtable td:nth-child(5) { display: none; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-inner">
    <div class="nav-brand">
      <div class="nav-icon">
        <svg viewBox="0 0 16 16"><path d="M3 2h10a1 1 0 011 1v10a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1zm5 2L5 9h2.5v3L11 7H8.5V4z"/></svg>
      </div>
      <div>
        <div class="nav-title">Netflix Watch</div>
        <div class="nav-week" id="nav-week">台灣觀影週報</div>
      </div>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchMain('overview')">總覽</button>
      <button class="nav-tab" onclick="switchMain('ranks')">排行榜</button>
      <button class="nav-tab" onclick="switchMain('breakdown')">分析</button>
    </div>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-eyebrow">Netflix Top 10 · 台灣</div>
  <div class="hero-title">本週觀影<br>數據報告</div>
  <div class="hero-sub" id="hero-sub">載入中...</div>
</div>

<div class="shell">
  <div id="error-area"></div>

  <!-- ── OVERVIEW ── -->
  <div id="main-overview" class="tab-content active">

    <div class="sec-label">核心指標</div>
    <div class="metrics" id="metrics-area">
      <div class="metric red"><div class="metric-accent"></div><div style="color:var(--text3);font-size:13px;padding-top:8px">載入中...</div></div>
      <div class="metric green"><div class="metric-accent"></div></div>
      <div class="metric amber"><div class="metric-accent"></div></div>
    </div>

    <div class="sec-label">全球 Top 10 — 本週</div>
    <div class="card" style="margin-bottom:28px">
      <div class="card-body">
        <table class="rtable">
          <thead><tr>
            <th style="width:40px">#</th>
            <th>作品</th>
            <th>國家</th>
            <th class="r">IMDb</th>
            <th class="r">上線年份</th>
            <th class="r">觀看時數</th>
            <th class="r">週變化</th>
          </tr></thead>
          <tbody id="overview-body"><tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text3)">載入中...</td></tr></tbody>
        </table>
      </div>
    </div>

    <div class="sec-label">趨勢</div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">台灣作品觀看時數趨勢</span>
        <div class="legend">
          <span><span class="ldot" style="background:var(--red)"></span>台灣作品</span>
          <span><span class="ldot" style="background:var(--border2)"></span>全球總計</span>
        </div>
      </div>
      <div class="chart-pad">
        <div class="chart-wrap" style="height:180px"><canvas id="trendChart"></canvas></div>
      </div>
    </div>
  </div>

  <!-- ── RANKS ── -->
  <div id="main-ranks" class="tab-content">
    <div class="sec-label" id="rank-label">台灣區影集榜</div>
    <div class="card">
      <div class="subtabs">
        <button class="stab active" onclick="switchSub('series')">影集</button>
        <button class="stab" onclick="switchSub('movie')">電影</button>
        <button class="stab" onclick="switchSub('show')">節目</button>
      </div>
      <div style="height:12px"></div>
      <div class="card-body">
        <table class="rtable">
          <thead><tr>
            <th style="width:40px">#</th>
            <th>作品</th>
            <th>國家</th>
            <th class="r">IMDb</th>
            <th class="r">上線年份</th>
            <th class="r">觀看時數</th>
            <th class="r">週變化</th>
          </tr></thead>
          <tbody id="rank-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ── BREAKDOWN ── -->
  <div id="main-breakdown" class="tab-content">
    <div class="grid2">
      <div>
        <div class="sec-label">各類型觀看時數佔比</div>
        <div class="card">
          <div class="bar-list" id="type-bars"></div>
        </div>
      </div>
      <div>
        <div class="sec-label">上榜作品國籍分布</div>
        <div class="card">
          <div class="bar-list" id="country-bars"></div>
        </div>
      </div>
    </div>

    <div class="sec-label">台灣 vs 全球 — 各週觀看時數（M 小時）</div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">週別對比</span>
        <div class="legend">
          <span><span class="ldot" style="background:var(--red)"></span>台灣作品</span>
          <span><span class="ldot" style="background:rgba(0,0,0,0.12)"></span>非台灣作品</span>
        </div>
      </div>
      <div class="chart-pad">
        <div class="chart-wrap" style="height:180px"><canvas id="compareChart"></canvas></div>
      </div>
    </div>
  </div>

</div>

<footer>
  數據來源：Netflix Top 10 官方榜單 &nbsp;·&nbsp; IMDb 官方 Dataset<br>
  每週二自動更新 &nbsp;·&nbsp; <span id="footer-ts"></span>
</footer>

<script>
Chart.defaults.color = '#aeaeb2';
Chart.defaults.borderColor = 'rgba(0,0,0,0.05)';
Chart.defaults.font.family = "-apple-system, 'SF Pro Display', sans-serif";

let DATA = null;
let trendChart = null;
let compareChart = null;

async function loadData() {
  try {
    const res = await fetch('data/data.json?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    DATA = await res.json();
    renderAll();
  } catch(e) {
    document.getElementById('error-area').innerHTML =
      `<div class="error-box">⚠ 數據載入失敗：${e.message}。請先執行 GitHub Actions 更新數據。</div>`;
    document.getElementById('hero-sub').textContent = '數據尚未更新';
  }
}

function chgBadge(prev, rank) {
  if (prev === null || prev === undefined) return '<span class="chg new">NEW</span>';
  const d = prev - rank;
  if (d > 0) return `<span class="chg up">↑${d}</span>`;
  if (d < 0) return `<span class="chg dn">↓${Math.abs(d)}</span>`;
  return `<span class="chg flat">—</span>`;
}

function streakBadge(w) {
  if (!w || w <= 1) return '';
  return `<span class="streak">🔥 連${w}週</span>`;
}

function renderRow(d) {
  const imdb = d.imdb_rating && d.imdb_rating !== '\\N'
    ? `<span class="imdb-score">★ ${d.imdb_rating}</span>`
    : `<span class="imdb-na">—</span>`;
  const yr = d.air_date && d.air_date !== '\\N'
    ? `<div class="airdate">${d.air_date}</div>`
    : `<div class="airdate" style="color:var(--text3)">—</div>`;
  return `<tr>
    <td><span class="rnum ${d.rank<=3?'gold':''}">${d.rank}</span></td>
    <td>
      <div class="rtitle">${d.title}${streakBadge(d.streak_weeks)}</div>
      <div class="rsub">${d.category==='series'?'影集':d.category==='movie'?'電影':'節目'}</div>
    </td>
    <td>
      <span class="country-flag">${d.country_flag||''}</span>
      <span class="country-name">${d.country||''}</span>
    </td>
    <td style="text-align:right">${imdb}</td>
    <td>${yr}</td>
    <td class="hrs">${d.hours_viewed!=null?d.hours_viewed+'M hrs':'—'}</td>
    <td>${chgBadge(d.prev_rank, d.rank)}</td>
  </tr>`;
}

function renderMetrics() {
  const w = DATA.current_week;
  const p = DATA.prev_week || {};

  function diffBadge(cur, prev, unit='') {
    if (prev == null) return '';
    const d = Math.round((cur - prev) * 10) / 10;
    const sign = d > 0 ? '+' : '';
    const cls = d > 0 ? 'up' : d < 0 ? 'dn' : 'flat';
    const arrow = d > 0 ? '↑' : d < 0 ? '↓' : '';
    return `<div class="m-diff ${cls}">${arrow} ${sign}${d}${unit} vs 上週</div>`;
  }

  document.getElementById('metrics-area').innerHTML = `
    <div class="metric red"><div class="metric-accent"></div>
      <div class="m-label">台灣上榜作品數</div>
      <div class="m-val">${w.tw_count}<span>/ 10</span></div>
      <div class="m-sub">影集 ${w.tw_series||0} · 電影 ${w.tw_movie||0} · 節目 ${w.tw_show||0}</div>
      ${diffBadge(w.tw_count, p.tw_count, ' 部')}
    </div>
    <div class="metric green"><div class="metric-accent"></div>
      <div class="m-label">台灣作品觀看佔比</div>
      <div class="m-val">${w.tw_pct}<span>%</span></div>
      <div class="m-sub">Top10 總時數 ${w.total_hours}M 小時</div>
      ${diffBadge(w.tw_pct, p.tw_pct, '%')}
    </div>
    <div class="metric amber"><div class="metric-accent"></div>
      <div class="m-label">台灣平均觀看時數</div>
      <div class="m-val">${w.tw_avg}<span>M hrs</span></div>
      <div class="m-sub">全球平均 ${w.global_avg}M hrs</div>
      ${diffBadge(w.tw_avg, p.tw_avg, 'M')}
    </div>`;
}

function renderOverviewTable() {
  const body = document.getElementById('overview-body');
  body.innerHTML = DATA.top10.length
    ? DATA.top10.map(renderRow).join('')
    : `<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text3)">本週無數據，請執行 Actions 更新</td></tr>`;
}

function renderTrend() {
  const hist = DATA.history || [];
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById('trendChart'), {
    type: 'line',
    data: {
      labels: hist.map(h => h.week),
      datasets: [
        { label:'台灣作品', data: hist.map(h=>h.tw_hours), borderColor:'#ff3b30', backgroundColor:'rgba(255,59,48,0.07)', borderWidth:2, pointRadius:4, pointBackgroundColor:'#ff3b30', fill:true, tension:0.4 },
        { label:'全球總計', data: hist.map(h=>h.total_hours), borderColor:'rgba(0,0,0,0.15)', borderWidth:1.5, pointRadius:3, pointBackgroundColor:'#ccc', fill:false, tension:0.4, borderDash:[5,4] }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ grid:{ display:false }, ticks:{ font:{ size:11 } } },
        y:{ grid:{ color:'rgba(0,0,0,0.04)' }, ticks:{ font:{ size:11 }, callback:v=>v+'M' } }
      }
    }
  });
}

function renderRankTable(cat) {
  const map = { series:'影集', movie:'電影', show:'節目' };
  document.getElementById('rank-label').textContent = `台灣區${map[cat]}榜`;
  const items = (DATA.by_category && DATA.by_category[cat]) || [];
  document.getElementById('rank-body').innerHTML = items.length
    ? items.map(renderRow).join('')
    : `<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text3)">本週無資料</td></tr>`;
}

function renderBreakdown() {
  const bd = DATA.breakdown || {};
  const types = [
    { name:'影集', pct: bd.series_pct||0, color:'#0071e3' },
    { name:'電影', pct: bd.movie_pct||0,  color:'#ff9f0a' },
    { name:'節目', pct: bd.show_pct||0,   color:'#ff3b30' },
  ];
  document.getElementById('type-bars').innerHTML = types.map(t => `
    <div class="bar-row">
      <div class="bar-name">${t.name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${t.pct}%;background:${t.color}"></div></div>
      <div class="bar-pct">${t.pct}%</div>
    </div>`).join('');

  const countries = bd.countries || [];
  const colors = ['#34c759','#0071e3','#ff9f0a','#aeaeb2','#ff3b30'];
  document.getElementById('country-bars').innerHTML = countries.map((c,i) => `
    <div class="bar-row">
      <div class="bar-name">${c.flag||''} ${c.name}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${c.pct}%;background:${colors[i%colors.length]}"></div></div>
      <div class="bar-pct">${c.pct}%</div>
    </div>`).join('');

  const hist = DATA.history || [];
  if (compareChart) compareChart.destroy();
  compareChart = new Chart(document.getElementById('compareChart'), {
    type:'bar',
    data:{
      labels: hist.map(h=>h.week),
      datasets:[
        { label:'台灣作品', data: hist.map(h=>h.tw_hours), backgroundColor:'rgba(255,59,48,0.75)', borderRadius:4 },
        { label:'非台灣', data: hist.map(h=>+(h.total_hours-h.tw_hours).toFixed(1)), backgroundColor:'rgba(0,0,0,0.07)', borderRadius:4 }
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ stacked:true, grid:{ display:false }, ticks:{ font:{ size:11 } } },
        y:{ stacked:true, grid:{ color:'rgba(0,0,0,0.04)' }, ticks:{ font:{ size:11 }, callback:v=>v+'M' } }
      }
    }
  });
}

function renderAll() {
  const w = DATA.current_week;
  document.getElementById('nav-week').textContent = w.week_label || w.week;
  document.getElementById('hero-sub').textContent =
    w.week && w.week !== '尚未更新'
      ? `週期 ${w.week_label || w.week} · Top 10 共 ${DATA.top10.length} 部作品`
      : '請先執行 GitHub Actions 更新數據';
  if (DATA.generated_at) {
    const d = new Date(DATA.generated_at);
    document.getElementById('footer-ts').textContent =
      '更新時間 ' + d.toLocaleDateString('zh-TW') + ' ' + d.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit'});
  }
  renderMetrics();
  renderOverviewTable();
  renderTrend();
  renderRankTable('series');
  renderBreakdown();
}

function switchMain(name) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById('main-'+name).classList.add('active');
  document.querySelectorAll('.nav-tab').forEach((el,i) => {
    el.classList.toggle('active', ['overview','ranks','breakdown'][i]===name);
  });
}

function switchSub(cat) {
  document.querySelectorAll('.stab').forEach((el,i) => {
    el.classList.toggle('active', ['series','movie','show'][i]===cat);
  });
  renderRankTable(cat);
}

loadData();
</script>
</body>
</html>
