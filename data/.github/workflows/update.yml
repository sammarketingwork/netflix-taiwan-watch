name: 每週更新 Netflix 數據

on:
  schedule:
    # 每週二 UTC 06:00（台灣時間週二下午 2 點）
    # Netflix 通常週二更新榜單
    - cron: '0 6 * * 2'
  workflow_dispatch:
    # 允許手動觸發（方便測試）

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 執行抓取腳本
        run: python .github/scripts/fetch_data.py

      - name: 提交並推送更新的數據
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json
          git diff --staged --quiet || git commit -m "chore: 自動更新 Netflix 週榜數據 $(date +'%Y-%m-%d')"
          git push
